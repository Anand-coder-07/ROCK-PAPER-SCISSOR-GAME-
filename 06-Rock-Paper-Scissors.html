<!DOCTYPE html>
<html >
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="rock-paper-scissor.css">
  </head>
  <body>

    <div>
      <div class="header-div">
        <h1>Rock Paper Scissors</h1>
      </div>

      <div class="button-div">
        <button class="button-r" onclick="
        
        playGame('rock');

        ">Rock</button>

        <button class="button-p" onclick="
       
        playGame('paper');

        ">Paper</button>
        <button class="button-s" onclick="

        playGame('scissors');
       
        ">Scissors</button> 

      </div>

      <div class="reset-b-div">
        <button class="reset-b"onclick="
          score.wins = 0,
          score.losses = 0,
          score.ties = 0;
          localStorage.removeItem('score');
        ">Reset Score</button>
      </div>

  
    </div>

    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0,
        ties: 0
      };

      /*
      if (!scorel) {
        score = {
          wins: 0,
          losses: 0,
          ties: 0
        };
      }
      */
      function playGame(playerMove) {

        const computerMove = pickComputerMove();

        let result ='' ;

        if(playerMove === 'rock') {

          if (computerMove === 'rock') {
            result = 'Tie.';
          } 
          else if (computerMove === 'paper') {
            result = 'You lose.' ;
          } 
          else if (computerMove === 'scissors') {
            result = 'You win.';
          }

        }else if(playerMove === 'paper') {

          if (computerMove === 'rock') {
            result = 'You win.';
          } 
          else if (computerMove === 'paper') {
            result = 'Tie.' ;
          } 
          else if (computerMove === 'scissors') {
            result = 'You lose.';
          }

        }else if(playerMove === 'scissors') {

          if (computerMove === 'rock') {
            result = ' You lose.';
          } 
          else if (computerMove === 'paper') {
            result = 'You win.' ;
          } 
          else if (computerMove === 'scissors') {
            result = 'Tie.';
          }
        }  

        if (result === 'You win.') {
          score.wins +=1 ;
        }
        else if (result ==='You lose.') {
          score.losses += 1;
        }
        else if (result === 'Tie.') {
          score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
Wins: ${score.wins},losses: ${score.losses},Ties: ${score.ties}`);
}

      function pickComputerMove() {

        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber <= 1 / 3) {
          computerMove = 'rock' ;
        } else if (randomNumber >=1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper' ;
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }
        return computerMove;
      }
    
    </script> 
  </body>
</html>
